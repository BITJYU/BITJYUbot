name: bot-a-scheduler

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-bot-a-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BAND_ACCESS_TOKEN: ${{ secrets.BAND_ACCESS_TOKEN_A }}
      BAND_KEY: ${{ secrets.BAND_KEY_A }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_A }}
      SHEET_URL: ${{ secrets.SHEET_URL_A }}
      SHEET_NAME: ${{ secrets.SHEET_NAME_A }}
      BOT_NAME: ${{ secrets.BOT_NAME_A }}
      BOT_USER_ID: ${{ secrets.BOT_USER_ID_A }}
      ATTENDANCE_GOLD: "100"
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot A scheduler
        run: python scheduler.py
